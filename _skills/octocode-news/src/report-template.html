<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Octocode News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <style>__INLINE_CSS__</style>
  </head>
  <body>
    <nav class="site-nav">
      <a href="https://octocode.ai" class="site-brand" target="_blank" rel="noreferrer noopener">
        <span class="site-logo">🐙</span>
        <span class="site-name">Octocode News</span>
      </a>
      <a href="https://octocode.ai" class="site-link" target="_blank" rel="noreferrer noopener">octocode.ai</a>
      <button class="dark-toggle" type="button" aria-label="Toggle dark mode" id="dark-toggle">◐</button>
    </nav>
    <main class="page">
      <div id="app"></div>
    </main>

    <script id="report-meta" type="application/json">__REPORT_META__</script>
    <script id="section-ai" type="application/json">__SECTION_AI__</script>
    <script id="section-devtools" type="application/json">__SECTION_DEVTOOLS__</script>
    <script id="section-web" type="application/json">__SECTION_WEB__</script>
    <script id="section-security" type="application/json">__SECTION_SECURITY__</script>
    <script id="section-repos" type="application/json">__SECTION_REPOS__</script>
    <script id="section-cross" type="application/json">__SECTION_CROSS__</script>
    <script>
      (() => {
        const PRIMARY_ORDER = ["ai", "devtools", "web", "security", "repos"];
        const OPTIONAL_ORDER = ["cross"];
        const LOW_HEAT_THRESHOLD = 45;
        const IMPORTANT_HEAT_THRESHOLD = 70;
        const DOMAIN_META = {
          ai: { label: "AI", icon: "A", className: "domain-ai", color: "var(--ai)" },
          devtools: {
            label: "Devtools",
            icon: "D",
            className: "domain-devtools",
            color: "var(--devtools)"
          },
          web: { label: "Web Platform", icon: "W", className: "domain-web", color: "var(--web)" },
          security: {
            label: "Security",
            icon: "S",
            className: "domain-security",
            color: "var(--security)"
          },
          repos: { label: "Repos", icon: "R", className: "domain-repos", color: "var(--repos)" },
          cross: {
            label: "Cross-domain",
            icon: "C",
            className: "domain-neutral",
            color: "var(--neutral)"
          },
          unknown: {
            label: "General",
            icon: "G",
            className: "domain-neutral",
            color: "var(--neutral)"
          }
        };

        const app = document.getElementById("app");
        const detailsMemory = {};

        function saveDetailsState() {
          const cov = app.querySelector(".coverage-details");
          if (cov) detailsMemory.coverage = cov.open;
        }

        function restoreDetailsState() {
          if ("coverage" in detailsMemory) {
            const cov = app.querySelector(".coverage-details");
            if (cov) cov.open = detailsMemory.coverage;
          }
        }

        function loadJsonBlock(elementId) {
          const el = document.getElementById(elementId);
          if (!el) return null;
          const text = el.textContent.trim();
          if (!text || text === "null" || text.startsWith("__")) return null;
          return JSON.parse(text);
        }

        let report;

        try {
          const meta = loadJsonBlock("report-meta");
          if (!meta) throw new Error("report-meta block is missing or empty");
          const sectionIds = [...PRIMARY_ORDER, ...OPTIONAL_ORDER];
          const sections = sectionIds
            .map(function (id) { return loadJsonBlock("section-" + id); })
            .filter(Boolean);
          report = Object.assign({}, meta, { sections: sections });
        } catch (error) {
          renderFatal("Could not parse report data.", String(error));
          return;
        }

        function renderFatal(title, detail) {
          app.innerHTML = "";
          const card = create("section", "panel fatal");
          const h1 = create("h1", "", title);
          const p = create(
            "p",
            "hero-copy",
            "The report template loaded, but the embedded data payload was invalid."
          );
          const pre = create("pre");
          pre.textContent = detail;
          card.append(h1, p, pre);
          app.append(card);
        }

        function create(tag, className, text) {
          const node = document.createElement(tag);
          if (className) node.className = className;
          if (text !== undefined) node.textContent = text;
          return node;
        }

        function safeArray(value) {
          return Array.isArray(value) ? value : [];
        }

        function domainMeta(id) {
          return DOMAIN_META[id] || DOMAIN_META.unknown;
        }

        function referenceLabelFromUrl(url) {
          try {
            return new URL(url).hostname.replace(/^www\./, "");
          } catch {
            return "Reference";
          }
        }

        function formatGenerated(dateString) {
          if (!dateString) return "Unknown";
          const date = new Date(dateString);
          if (Number.isNaN(date.getTime())) return dateString;
          return new Intl.DateTimeFormat(undefined, {
            month: "short",
            day: "numeric",
            year: "numeric"
          }).format(date);
        }

        function splitParagraphs(value) {
          return String(value || "")
            .split(/\n{2,}|\r\n\r\n/)
            .map((part) => part.trim())
            .filter(Boolean);
        }

        function cleanText(value) {
          return typeof value === "string" ? value.trim() : "";
        }

        function truncateAtWordBoundary(value, maxChars) {
          const text = cleanText(value).replace(/\s+/g, " ");
          if (!text || text.length <= maxChars) {
            return text;
          }

          const clipped = text.slice(0, maxChars - 1);
          const boundary = clipped.lastIndexOf(" ");
          const base =
            boundary >= Math.floor(maxChars * 0.6) ? clipped.slice(0, boundary) : clipped;
          return `${base.trimEnd()}...`;
        }

        function normalizeReferences(value) {
          return safeArray(value).flatMap((entry) => {
            if (typeof entry === "string") {
              return [
                {
                  label: referenceLabelFromUrl(entry),
                  url: entry,
                  kind: ""
                }
              ];
            }

            if (!entry || typeof entry !== "object") {
              return [];
            }

            const url =
              typeof entry.url === "string"
                ? entry.url
                : typeof entry.link === "string"
                  ? entry.link
                  : "";
            if (!url) {
              return [];
            }

            return [
              {
                ...entry,
                label: String(
                  entry.label || entry.title || entry.source || referenceLabelFromUrl(url)
                ),
                url,
                kind: entry.kind ? String(entry.kind) : ""
              }
            ];
          });
        }

        function normalizeItem(item, fallbackDomain) {
          const base = item && typeof item === "object" ? { ...item } : {};
          const domain = item && item.domain ? item.domain : fallbackDomain || "unknown";
          const references = normalizeReferences(item && item.references);
          const whyImportant =
            cleanText(item && item.whyImportant) || cleanText(item && item.whyInteresting);
          const whyInteresting = cleanText(item && item.whyInteresting) || whyImportant;
          const title = item && item.title ? item.title : "Untitled item";
          const summary = item && item.summary ? item.summary : "";
          const heat = Number.isFinite(item && item.heat) ? item.heat : 0;
          const shouldAddCompactCopy =
            Boolean(
              cleanText(item && item.shortTitle) || cleanText(item && item.shortDescription)
            ) || heat < LOW_HEAT_THRESHOLD;
          const shortTitle =
            cleanText(item && item.shortTitle) ||
            (shouldAddCompactCopy ? truncateAtWordBoundary(title, 72) || title : "");
          const shortDescription =
            cleanText(item && item.shortDescription) ||
            (shouldAddCompactCopy ? truncateAtWordBoundary(summary, 180) || summary : "");

          return {
            ...base,
            domain,
            type: item && item.type ? item.type : "blog",
            title,
            shortTitle,
            link: item && item.link ? item.link : "#",
            source: item && item.source ? item.source : "Unknown source",
            sourceUrl: item && item.sourceUrl ? item.sourceUrl : "",
            summary,
            shortDescription,
            whyImportant,
            whyInteresting,
            references,
            date: item && item.date ? item.date : "",
            dateISO: item && item.dateISO ? item.dateISO : "",
            heat,
            stars: item && item.stars ? item.stars : "",
            imageUrl: item && item.imageUrl ? item.imageUrl : ""
          };
        }

        function hasDomainSignal(domainId) {
          return (
            safeArray(report.topItems).some((item) => item && item.domain === domainId) ||
            safeArray(report.sections).some(
              (section) =>
                (section && section.id === domainId) ||
                safeArray(section && section.items).some((item) => item && item.domain === domainId)
            )
          );
        }

        function domainOrderForReport() {
          return PRIMARY_ORDER.concat(OPTIONAL_ORDER.filter((id) => hasDomainSignal(id)));
        }

        function sortByHeat(items) {
          return safeArray(items)
            .slice()
            .sort((a, b) => {
              if (b.heat !== a.heat) return b.heat - a.heat;
              const ad = Date.parse(a.dateISO || a.date || "");
              const bd = Date.parse(b.dateISO || b.date || "");
              return (Number.isNaN(bd) ? 0 : bd) - (Number.isNaN(ad) ? 0 : ad);
            });
        }

        function normalizeSections(order) {
          const incoming = new Map(
            safeArray(report.sections).map((section) => [section.id, section])
          );
          return order
            .filter((id) => PRIMARY_ORDER.includes(id) || incoming.has(id))
            .map((id) => {
              const section = incoming.get(id) || {};
              const meta = domainMeta(id);
              return {
                ...section,
                id,
                name: section.name || meta.label,
                icon: section.icon || meta.icon,
                iconClass: section.iconClass || "",
                quiet: Boolean(section.quiet),
                quietMsg:
                  section.quietMsg ||
                  `No notable ${meta.label.toLowerCase()} updates in this window.`,
                items: sortByHeat(safeArray(section.items).map((item) => normalizeItem(item, id)))
              };
            });
        }

        function normalizeTopItems() {
          return sortByHeat(safeArray(report.topItems).map((item) => normalizeItem(item)));
        }

        function allItems(sections, topItems) {
          return topItems.concat(sections.flatMap((section) => section.items));
        }

        function dedupeByLink(items) {
          const seen = new Set();
          return safeArray(items).filter((item) => {
            const key =
              item && item.link ? item.link : `${item.title}::${item.dateISO || item.date}`;
            if (seen.has(key)) {
              return false;
            }
            seen.add(key);
            return true;
          });
        }

        function domainCounts(items) {
          return items.reduce((acc, item) => {
            const key = item && item.domain ? item.domain : "unknown";
            acc[key] = (acc[key] || 0) + 1;
            return acc;
          }, {});
        }

        function uniqueSourceCount(items) {
          return new Set(
            safeArray(items)
              .map((item) => cleanText(item && item.source))
              .filter(Boolean)
          ).size;
        }

        function sectionMetrics(section) {
          return {
            items: safeArray(section && section.items),
            uniqueSources: uniqueSourceCount(section && section.items)
          };
        }

        function isImportantItem(item) {
          return Number.isFinite(item.heat) && item.heat >= IMPORTANT_HEAT_THRESHOLD;
        }

        function highlightItemsForReport(topItems, sections) {
          const importantItems = sortByHeat(
            dedupeByLink(allItems(sections, topItems)).filter(isImportantItem)
          );
          if (importantItems.length) {
            return importantItems;
          }
          return sortByHeat(dedupeByLink(topItems)).slice(0, 6);
        }

        function removeHighlightedItems(sections, highlightLinks) {
          return sections.map((section) => ({
            ...section,
            items: section.items.filter((item) => !highlightLinks.has(item.link))
          }));
        }

        function computeStats(highlightItems, items, order) {
          const importantItems = items.filter(isImportantItem).length;
          const surfacedDomains = new Set(
            items.map((item) => item.domain).filter((domain) => order.includes(domain))
          ).size;
          return {
            totalItems: items.length,
            highlightItems: highlightItems.length,
            importantItems,
            surfacedDomains,
            availableDomains: order.length,
            uniqueSources: uniqueSourceCount(items)
          };
        }

        function render() {
          const order = domainOrderForReport();
          const sections = normalizeSections(order);
          const topItems = normalizeTopItems();
          const mergedItems = allItems(sections, topItems);
          const highlightItems = highlightItemsForReport(topItems, sections);
          const highlightLinks = new Set(highlightItems.map((item) => item.link));
          const remainingSections = removeHighlightedItems(sections, highlightLinks);
          const countsByDomain = domainCounts(mergedItems);
          const stats = computeStats(highlightItems, mergedItems, order);

          app.innerHTML = "";

          const highlightPanel = renderHighlights(highlightItems);
          const sectionPanel = renderSections(remainingSections);

          app.append(
            renderHero(sections, stats, countsByDomain, order),
            renderJumpStrip(sections),
            ...(highlightPanel ? [highlightPanel] : []),
            ...(sectionPanel ? [sectionPanel] : []),
            renderFooter()
          );
          updateTitle();
          restoreDetailsState();
        }

        function renderHero(sections, stats, countsByDomain, order) {
          const hero = create("section", "hero");
          hero.id = "top";
          const grid = create("div", "hero-grid");
          const sectionMap = new Map(sections.map((section) => [section.id, section]));

          const left = create("div");
          const eyebrow = create(
            "div",
            "eyebrow",
            `${String(report.windowLabel || "custom").toUpperCase()} news deck · ${formatGenerated(report.generated)}`
          );
          const title = create("h1", "", "What Changed. What Matters.");
          const summary = create("div", "hero-summary");
          const paragraphs = splitParagraphs(
            report.tldr ||
              "High-signal developments across AI, developer tools, web platform, security, and repos."
          );
          paragraphs.forEach((paragraph, index) => {
            summary.append(create("p", `hero-copy${index === 0 ? " is-lead" : ""}`, paragraph));
          });

          const metaRow = create("div", "meta-row");
          metaRow.append(
            metaChip("Window", report.window || report.windowLabel || "Unknown"),
            metaChip("Generated", formatGenerated(report.generated)),
            metaChip("Range", String(report.windowLabel || "custom").toUpperCase()),
            metaChip("Domains", `${stats.surfacedDomains}/${stats.availableDomains}`)
          );

          left.append(eyebrow, title, summary, metaRow);

          const right = create("aside", "stats-panel");
          right.append(
            create("h2", "", "Report Shape"),
            create(
              "p",
              "stats-sub",
              "A fast read on volume, priority, and how much of the landscape moved."
            )
          );

          const statGrid = create("div", "stat-grid");
          statGrid.append(
            statCard(stats.totalItems, "Total stories"),
            statCard(stats.highlightItems, "Highlights"),
            statCard(stats.importantItems, "High-signal"),
            statCard(stats.surfacedDomains, "Domains active"),
            statCard(stats.uniqueSources, "Unique sources")
          );
          right.append(statGrid);

          const coverageDetails = create("details", "coverage-details");
          coverageDetails.open = window.matchMedia("(min-width: 981px)").matches;
          const coverageSummary = create("summary", "coverage-summary");
          coverageSummary.append(
            create("strong", "", "Coverage by domain"),
            create("span", "", "Open distribution")
          );

          const bars = create("div", "coverage-bars");
          const maxCount = Math.max(1, ...order.map((id) => countsByDomain[id] || 0));
          order.forEach((id) => {
            const meta = domainMeta(id);
            const section = sectionMap.get(id);
            const row = create("div", "coverage-row");
            const label = create("span", "", (section && section.name) || meta.label);
            const track = create("div", "coverage-track");
            const fill = create("div", "coverage-fill");
            const count = countsByDomain[id] || 0;
            fill.style.width = `${(count / maxCount) * 100}%`;
            fill.style.background = `linear-gradient(90deg, ${meta.color}, rgba(255,255,255,0.75))`;
            track.append(fill);
            const value = create("span", "", `${count}`);
            row.append(label, track, value);
            bars.append(row);
          });
          coverageDetails.append(coverageSummary, bars);
          right.append(coverageDetails);

          grid.append(left, right);
          hero.append(grid);
          return hero;
        }

        function metaChip(label, value) {
          const chip = create("div", "meta-chip");
          const strong = create("strong", "", value);
          const span = create("span", "", label);
          chip.append(strong, span);
          return chip;
        }

        function statCard(value, label) {
          const card = create("div", "stat-card");
          card.append(
            create("div", "stat-value", String(value)),
            create("div", "stat-label", label)
          );
          return card;
        }

        function renderHighlights(items) {
          if (!items.length) {
            return null;
          }

          const panel = create("section", "panel");
          panel.append(
            create("h2", "", "Main Highlights"),
            create(
              "p",
              "panel-copy",
              `${items.length} pinned stor${items.length === 1 ? "y" : "ies"}, ranked by significance and kept separate so the scan starts with the strongest signal.`
            )
          );

          const grid = create("div", "highlights-grid");
          const hottestLink = items[0] ? items[0].link : "";
          items.forEach((item, index) => {
            grid.append(renderItemCard(item, true, index, item.link === hottestLink));
          });
          panel.append(grid);
          return panel;
        }

        function renderJumpStrip(sections) {
          const strip = create("nav", "jump-strip");
          strip.setAttribute("aria-label", "Jump to section");
          sections.forEach((section) => {
            const meta = domainMeta(section.id);
            const btn = create("a", "domain-button", meta.label);
            btn.href = `#${section.id}`;
            btn.dataset.domain = section.id;
            btn.style.setProperty("--btn-accent", meta.color);
            if (section.quiet) btn.classList.add("is-quiet");
            strip.append(btn);
          });
          return strip;
        }

        function renderSections(sections) {
          if (!sections.length) {
            return null;
          }

          const wrap = create("div", "stack");
          sections.forEach((section) => {
            if (section.quiet) {
              const meta = domainMeta(section.id);
              const card = create("section", "section-card is-quiet");
              card.id = section.id;
              card.dataset.domain = section.id;
              card.style.setProperty("--section-accent", meta.color);
              const head = create("div", "section-head");
              const badge = create("div", "section-badge", section.icon || meta.icon);
              badge.style.color = meta.color;
              const titleWrap = create("div");
              titleWrap.append(create("h2", "section-title", section.name));
              head.append(badge, titleWrap);
              card.append(head);
              card.append(create("p", "quiet-card", section.quietMsg));
              wrap.append(card);
              return;
            }
            if (!section.items.length) return;

            const meta = domainMeta(section.id);
            const card = create("section", "section-card");
            card.id = section.id;
            card.dataset.domain = section.id;
            card.style.setProperty("--section-accent", meta.color);

            const head = create("div", "section-head");
            const badge = create("div", "section-badge", section.icon || meta.icon);
            badge.style.color = meta.color;

            const titleWrap = create("div");
            titleWrap.append(
              create(
                "div",
                "section-kicker",
                `${section.items.length} stor${section.items.length === 1 ? "y" : "ies"} in full`
              ),
              create("h2", "section-title", section.name)
            );

            const pillRow = create("div", "pill-row");
            const metrics = sectionMetrics(section);
            pillRow.append(domainPill(section.id));
            pillRow.append(
              microPill(
                `${section.items.length} item${section.items.length === 1 ? "" : "s"}`
              )
            );
            pillRow.append(
              microPill(
                `${metrics.uniqueSources} source${metrics.uniqueSources === 1 ? "" : "s"}`
              )
            );
            head.append(badge, titleWrap, pillRow);
            card.append(head);

            card.append(
              create(
                "p",
                "section-summary",
                `${section.name} — ${section.items.length} ${section.items.length === 1 ? "story" : "stories"} from ${metrics.uniqueSources} ${metrics.uniqueSources === 1 ? "source" : "sources"}.`
              )
            );

            const items = create("div", "section-items");
            section.items.forEach((item, index) => {
              items.append(renderItemCard(item, false, index, false));
            });
            card.append(items);
            wrap.append(card);
          });
          return wrap;
        }

        function domainPill(domainId) {
          const meta = domainMeta(domainId);
          const pill = create("div", "micro-pill");
          pill.textContent = meta.label;
          pill.style.color = meta.color;
          pill.style.borderColor = "rgba(29, 37, 47, 0.08)";
          return pill;
        }

        function isLowHeatItem(item) {
          return Number.isFinite(item.heat) && item.heat < LOW_HEAT_THRESHOLD;
        }

        function displayTitle(item) {
          if (!isLowHeatItem(item)) {
            return item.title;
          }

          return cleanText(item.shortTitle) || item.title;
        }

        function displaySummary(item) {
          if (!isLowHeatItem(item)) {
            return item.summary;
          }

          return cleanText(item.shortDescription) || item.summary;
        }

        function importanceCopy(item) {
          return cleanText(item.whyImportant) || cleanText(item.whyInteresting);
        }

        function listSummary(item) {
          return (
            cleanText(item.shortDescription) ||
            truncateAtWordBoundary(item.summary, 180) ||
            item.summary
          );
        }

        function primaryReference(item) {
          const firstReference = safeArray(item.references)[0];
          if (firstReference && firstReference.url) {
            return firstReference;
          }

          if (item.link && item.link !== "#") {
            return {
              label: item.source || "Story link",
              url: item.link,
              kind: "story"
            };
          }

          return null;
        }

        function renderItemCard(item, featured, index, isHottest) {
          const meta = domainMeta(item.domain);
          const hottestClass = isHottest ? " is-hottest" : "";
          const leadClass = featured && index === 0 ? " is-lead" : "";
          const compactClass = featured ? " featured" : " compact";
          const compactCopy = featured ? false : true;
          const card = create(
            "article",
            `item-card ${meta.className}${compactClass}${hottestClass}${leadClass}`
          );
          card.style.setProperty("--delay", String(index));
          card.style.setProperty("--accent", meta.color);
          card.dataset.domain = item.domain;
          if (item.dateISO) {
            card.dataset.date = item.dateISO;
          }

          const top = create("div", "item-topline");
          const left = create("div", "pill-row");
          left.append(
            rankPill(featured ? storyRankLabel(index, isHottest) : compactRankLabel(index)),
            domainPill(item.domain),
            microPill(typeLabel(item.type))
          );

          const right = create("div", "item-actions");
          if (Number.isFinite(item.heat)) {
            right.append(heatPill(item.heat));
          }
          right.append(microPill(item.date || item.dateISO || "Undated"));
          top.append(left, right);

          const sourceRow = create("div", "card-meta");
          sourceRow.append(sourceNode(item));
          if (item.stars) sourceRow.append(microPill(item.stars));

          const title = create("h3", "item-title");
          const linkLabel = displayTitle(item);
          const link = create("a", "", linkLabel);
          link.href = item.link;
          link.target = "_blank";
          link.rel = "noreferrer noopener";
          if (linkLabel !== item.title) {
            link.title = item.title;
          }
          title.append(link);

          const whyText = importanceCopy(item);
          const whyInteresting = whyText ? importanceNode(whyText) : null;
          const summary = create(
            "p",
            `item-summary${compactCopy ? " is-compact" : ""}`,
            featured ? displaySummary(item) : listSummary(item)
          );

          card.append(top, sourceRow, title);
          if (item.imageUrl) {
            card.append(imageNode(item));
          }
          card.append(summary);
          if (whyInteresting) {
            card.append(whyInteresting);
          }
          card.append(itemFooter(item));

          return card;
        }

        function imageNode(item) {
          const figure = create("figure", "item-figure");
          const image = create("img", "item-image");
          image.src = item.imageUrl;
          image.alt = item.title || item.source || "Story image";
          image.loading = "lazy";
          image.decoding = "async";
          image.referrerPolicy = "no-referrer";
          image.addEventListener("error", () => {
            figure.remove();
          });
          figure.append(image);
          return figure;
        }

        function sourceNode(item) {
          if (item.sourceUrl) {
            const anchor = create("a", "micro-pill");
            anchor.href = item.sourceUrl;
            anchor.target = "_blank";
            anchor.rel = "noreferrer noopener";
            anchor.textContent = item.source;
            return anchor;
          }
          return microPill(item.source);
        }

        function microPill(value) {
          return create("div", "micro-pill", value);
        }

        function typeLabel(type) {
          const value = cleanText(type).toLowerCase();
          if (!value) return "Update";
          return value.charAt(0).toUpperCase() + value.slice(1);
        }

        function storyRankLabel(index, isHottest) {
          if (isHottest) return "Lead story";
          return `Highlight ${String(index + 1).padStart(2, "0")}`;
        }

        function compactRankLabel(index) {
          return `Story ${String(index + 1).padStart(2, "0")}`;
        }

        function rankPill(label) {
          return create("div", "micro-pill item-rank", label);
        }

        function heatPill(value) {
          const tier = value >= IMPORTANT_HEAT_THRESHOLD ? "heat-hot"
            : value >= LOW_HEAT_THRESHOLD ? "heat-warm" : "heat-cool";
          return create("div", `micro-pill item-heat ${tier}`, `Heat ${value}`);
        }

        function sourceCtaNode(item) {
          const primary = primaryReference(item);
          const href = (primary && primary.url) || item.link;
          const anchor = create("a", "item-cta", "Source Link");
          anchor.href = href;
          anchor.target = "_blank";
          anchor.rel = "noreferrer noopener";
          if (primary && primary.label) {
            anchor.title = `Open ${primary.label}`;
          }
          return anchor;
        }

        function itemFooter(item) {
          const footer = create("div", "item-footer");
          const left = create("div", "pill-row");
          const referenceMenu = referenceMenuNode(item);
          if (referenceMenu) {
            left.append(referenceMenu);
          } else {
            const referenceCount = safeArray(item.references).length;
            left.append(microPill(referenceCount ? "1 ref" : "Story link"));
          }
          footer.append(left, sourceCtaNode(item));
          return footer;
        }

        function importanceNode(text) {
          const wrap = create("div", "item-why");
          wrap.append(
            create("div", "item-why-kicker", "Why it matters"),
            create("div", "item-why-text", text)
          );
          return wrap;
        }

        function referenceMenuNode(item) {
          const references = safeArray(item.references);
          if (references.length <= 1) {
            return null;
          }

          const menu = create("details", "reference-menu");
          const summary = create("summary", "item-ref reference-menu-trigger", `${references.length} refs`);
          summary.title = `Choose a reference for ${item.title}`;

          const panel = create("div", "reference-menu-panel");
          panel.append(create("div", "reference-menu-note", "Choose a source"));

          const list = create("div", "reference-menu-list");
          references.forEach((reference) => {
            list.append(referenceNode(reference));
          });
          panel.append(list);

          menu.append(summary, panel);
          return menu;
        }

        function referenceNode(reference) {
          const anchor = create("a", "reference-link", "");
          anchor.href = reference.url;
          anchor.target = "_blank";
          anchor.rel = "noreferrer noopener";
          anchor.append(
            create("span", "reference-link-label", reference.label || "Reference")
          );

          const meta = referenceMeta(reference);
          if (meta) {
            anchor.append(create("span", "reference-link-meta", meta));
          }
          return anchor;
        }

        function referenceMeta(reference) {
          const parts = [];
          const source = cleanText(reference.source);
          const kind = cleanText(reference.kind);
          const label = cleanText(reference.label);
          const hostname = referenceLabelFromUrl(reference.url);

          if (source && source !== label) {
            parts.push(source);
          }
          if (kind) {
            parts.push(kind);
          }
          if (!parts.length && hostname !== label) {
            parts.push(hostname);
          }

          return parts.join(" • ");
        }

        function updateTitle() {
          document.title = `Octocode News${report.window ? ` — ${report.window}` : ""}`;
        }

        function renderFooter() {
          const footer = create("div", "footer-note");
          footer.append(
            document.createTextNode("Signal, not noise. Powered by "),
            (() => {
              const a = create("a", "footer-link", "🐙 Octocode");
              a.href = "https://octocode.ai";
              a.target = "_blank";
              a.rel = "noreferrer noopener";
              return a;
            })()
          );
          return footer;
        }

        function mountBackToTop() {
          const btn = create("button", "back-to-top", "↑");
          btn.type = "button";
          btn.setAttribute("aria-label", "Back to top");
          btn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
          document.body.append(btn);
          let ticking = false;
          window.addEventListener(
            "scroll",
            () => {
              if (ticking) return;
              ticking = true;
              requestAnimationFrame(() => {
                btn.classList.toggle("is-visible", window.scrollY > 600);
                ticking = false;
              });
            },
            { passive: true }
          );
        }

        function mountDarkToggle() {
          const btn = document.getElementById("dark-toggle");
          if (!btn) return;
          const stored = localStorage.getItem("octonews-dark");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (stored === "true" || (!stored && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
          btn.addEventListener("click", () => {
            const active = document.documentElement.classList.toggle("dark");
            localStorage.setItem("octonews-dark", String(active));
          });
        }

        render();
        mountBackToTop();
        mountDarkToggle();
      })();
    </script>
  </body>
</html>
