[package]
name = "octocode-lsp"
version = "16.0.0"
edition = "2021"
description = "Rust native LSP client, server registry, and semantic navigation runtime for Octocode"
license = "MIT"
repository = "https://github.com/bgauryy/octocode-mcp"
keywords = ["napi", "lsp", "language-server", "tree-sitter", "nodejs"]
categories = ["development-tools", "parsing"]

[lints.clippy]
all            = { level = "deny", priority = -1 }
unwrap_used    = "deny"
needless_pass_by_value = "allow"
dbg_macro      = "deny"
print_stdout   = "deny"
print_stderr   = "deny"

[lib]
path = "src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["napi4", "tokio_rt", "serde-json"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["fs", "io-util", "process", "rt-multi-thread", "sync", "time"] }
lsp-types = "0.97"
url = "2"
which = "8"

# Tree-sitter fallback / symbol anchoring.
tree-sitter = "0.26"
tree-sitter-language = "0.1"
tree-sitter-typescript = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-python = "0.23"
tree-sitter-go = "0.23"
tree-sitter-rust = "0.23"
tree-sitter-java = "0.23"
tree-sitter-c = "0.23"
tree-sitter-cpp = { version = "0.23", optional = true }
tree-sitter-c-sharp = { version = "0.23", optional = true }
tree-sitter-bash = "0.23"
tree-sitter-json = "0.24"
tree-sitter-yaml = "0.7"
tree-sitter-toml-ng = "0.7"
tree-sitter-html = "0.23"
tree-sitter-css = "0.25"
tree-sitter-scss = "1"
tree-sitter-less = "1"

[features]
default = ["tree-sitter-large-grammars"]
tree-sitter-cpp = ["dep:tree-sitter-cpp"]
tree-sitter-c-sharp = ["dep:tree-sitter-c-sharp"]
tree-sitter-large-grammars = ["tree-sitter-cpp", "tree-sitter-c-sharp"]

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = "symbols"
