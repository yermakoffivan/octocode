name: CI - Lint, Build & Test

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Health, Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check workspace contract
        run: yarn health:check

      - name: Verify docs and workflow references
        run: yarn docs:verify

      - name: Run ESLint
        run: yarn lint

      - name: Build shared package types
        run: yarn workspace octocode-shared run build:dev

      - name: Build security package types
        run: yarn workspace octocode-security-utils run build:dev

      - name: Build MCP package types
        run: yarn workspace octocode-mcp run build:dev

      - name: Run type checks
        run: yarn typecheck

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build all packages
        run: yarn build

      - name: Verify build outputs
        run: node scripts/workspace-health.mjs check-outputs

      - name: Run tests with coverage
        run: yarn test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            packages/*/coverage/
          retention-days: 7

  pr-validation-complete:
    name: PR Validation Complete
    needs: [checks, build-and-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.checks.result }}" != "success" ] || \
             [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "❌ One or more CI jobs failed"
            echo "   Checks: ${{ needs.checks.result }}"
            echo "   Build & Test: ${{ needs.build-and-test.result }}"
            exit 1
          fi
          echo "✅ All CI checks passed!"
          echo "   Checks: ${{ needs.checks.result }}"
          echo "   Build & Test: ${{ needs.build-and-test.result }}"
