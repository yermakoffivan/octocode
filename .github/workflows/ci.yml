name: CI - Lint, Build & Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify docs
        run: yarn docs:verify

      - name: Lint
        # octocode-engine excluded: Rust/clippy compilation is too costly for CI
        run: yarn lint:ci

      # Build must run before Typecheck/Test: packages consume their siblings'
      # compiled output (e.g. @octocodeai/octocode-engine subpath exports map to
      # ./dist/*, which is gitignored), and tools-core tests load the host
      # octocode-engine native addon through the workspace dependency.
      - name: Build
        # build:ci builds the host octocode-engine native addon once, then skips
        # rebuilding octocode-engine while compiling dependent packages.
        run: yarn build:ci

      - name: Verify build outputs
        run: node scripts/workspace-health.mjs check-outputs

      - name: Typecheck
        # octocode-engine excluded: needs napi-generated index.d.ts which requires Rust build
        run: yarn typecheck:ci

      - name: Test
        # octocode-engine excluded: depends on napi native build
        run: yarn test:ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: packages/*/coverage/
          retention-days: 7
