name: CI - Lint, Build & Test

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        # Pinned (not `@stable`): with clippy `all = deny` + `-D warnings`, a
        # floating toolchain can red an unrelated PR the day upstream adds a
        # new lint. Bump deliberately alongside packages/octocode-engine/rust-toolchain.toml.
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/octocode-engine

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check workspace health
        run: yarn health:check

      - name: Verify docs
        run: yarn docs:verify

      - name: Lint
        run: yarn lint

      # Build must run before Typecheck: packages consume their siblings'
      # compiled output (e.g. @octocodeai/octocode-engine subpath exports map to
      # ./dist/*, which is gitignored). `yarn typecheck` only runs `tsc --noEmit`
      # and never emits that dist, so on a fresh checkout typecheck would fail to
      # resolve those modules unless the workspace is built first.
      - name: Build
        # Thin LTO + parallel codegen units for CI only: this build verifies
        # correctness, it doesn't ship. Fat LTO + codegen-units=1 (the
        # profile.release used for published artifacts, see
        # packages/octocode-engine/Cargo.toml) disables parallel codegen and
        # is the slowest possible config — thin LTO recovers ~95% of the
        # runtime win at roughly half the compile time.
        env:
          CARGO_PROFILE_RELEASE_LTO: thin
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: '16'
        run: yarn build

      - name: Verify build outputs
        run: node scripts/workspace-health.mjs check-outputs

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

      - name: Test Rust core
        run: yarn workspace @octocodeai/octocode-engine test:rust

      - name: Audit Rust dependencies
        working-directory: packages/octocode-engine
        run: cargo audit -D unmaintained -D unsound -D yanked

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: packages/*/coverage/
          retention-days: 7
